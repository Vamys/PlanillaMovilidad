name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet openpyxl

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.6'
          
      - name: Build APK
        run: |
          flet build apk --project PlanillaMovilidad --description "Generador de Planillas de Movilidad"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlanillaMovilidad-APK
          path: build/apk/**/*.apk
