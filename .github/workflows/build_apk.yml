name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite lanzarlo manualmente desde la pestaña Actions

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar Flet (misma versión que en desarrollo) y openpyxl
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.85.3" openpyxl

      # 4. Instalar Java 17 (requerido por Android SDK)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. Instalar dependencias del sistema requeridas por Flet build
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl git unzip xz-utils zip libglu1-mesa

      # 6. Construir el APK
      #    flet build descarga Flutter automáticamente la primera vez
      - name: Build APK
        run: |
          flet build apk \
            --project PlanillaMovilidad \
            --description "Generador de Planillas de Movilidad" \
            --org com.corporacion.planilla \
            --yes \
            -vv

      # 7. Subir el APK como artefacto descargable
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlanillaMovilidad-APK
          path: build/apk/**/*.apk
          if-no-files-found: error
